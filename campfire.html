        // ==========================================
        // 16. V6.0 VAULT ENGINE (adapted from v5.2)
        // ==========================================
        let vaultHandle = null;

        const idb = {
            db: null,
            async init() {
                if (this.db) return;
                return new Promise((resolve, reject) => {
                    try {
                        const req = indexedDB.open('CampfireVaultDB', 1);
                        req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
                        req.onsuccess = e => { this.db = e.target.result; resolve(); };
                        req.onerror = e => reject(e);
                    } catch(e) { resolve(); }
                });
            },
            async get(key) {
                try {
                    await this.init();
                    if (!this.db) return null;
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('handles', 'readonly');
                        const req = tx.objectStore('handles').get(key);
                        req.onsuccess = e => resolve(e.target.result);
                        req.onerror = () => resolve(null);
                    });
                } catch(e) { return null; }
            },
            async set(key, val) {
                try {
                    await this.init();
                    if (!this.db) return;
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('handles', 'readwrite');
                        tx.objectStore('handles').put(val, key);
                        tx.oncomplete = () => resolve();
                    });
                } catch(e) { console.warn("IDB persist failed.", e); }
            }
        };

        async function verifyPermission(fileHandle, readWrite) {
            const options = { mode: readWrite ? 'readwrite' : 'read' };
            if ((await fileHandle.queryPermission(options)) === 'granted') return true;
            if ((await fileHandle.requestPermission(options)) === 'granted') return true;
            return false;
        }

        let _sessionsDir = null;

        async function initVaultStructure() {
            if (!vaultHandle) return;
            _sessionsDir = await vaultHandle.getDirectoryHandle('sessions', { create: true });

            // Load config from vault if available
            try {
                await vaultHandle.getFileHandle('config.json');
                await loadConfigFromVault();
            } catch(e) {
                // No config.json yet, write current config
                await saveConfigToVault();
            }
        }

        async function saveConfigToVault() {
            if (!vaultHandle) return;
            try {
                const data = { secrets: config, directives };
                const fh = await vaultHandle.getFileHandle('config.json', { create: true });
                const w = await fh.createWritable();
                await w.write(JSON.stringify(data, null, 2));
                await w.close();
            } catch(e) { console.error('Config save to vault failed', e); }
        }

        async function loadConfigFromVault() {
            if (!vaultHandle) return false;
            try {
                const fh = await vaultHandle.getFileHandle('config.json');
                const file = await fh.getFile();
                const data = JSON.parse(await file.text());
                if (data.secrets) {
                    config = { ...CONFIG_DEFAULTS, ...data.secrets, models: { ...CONFIG_DEFAULTS.models, ...(data.secrets.models || {}) } };
                    localStorage.setItem('campfire_secrets', JSON.stringify(config));
                }
                if (data.directives) {
                    directives = { ...SYSTEM_PROMPTS, ...data.directives };
                    localStorage.setItem('campfire_directives_v5_2', JSON.stringify(directives));
                }
                loadUI();
                return true;
            } catch(e) { return false; }
        }

        async function getSessionsDir() {
            if (_sessionsDir) return _sessionsDir;
            if (!vaultHandle) return null;
            try {
                _sessionsDir = await vaultHandle.getDirectoryHandle('sessions', { create: true });
            } catch(e) { return null; }
            return _sessionsDir;
        }

        async function mountVault() {
            try {
                vaultHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                await idb.set('rootHandle', vaultHandle);
                await initVaultStructure();
                await loadConfigFromVault();
                updateVaultStatus(true);
                loadVaultHistory();
                loadMemoryIndex();
                recoverBackups();
            } catch (err) {
                if(err.name !== 'AbortError') alert("挂载中止或失败。\n" + err.message);
            }
        }

        async function recoverBackups() {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('campfire_backup_')) keys.push(k);
            }
            if (keys.length === 0) return;
            const dir = await getSessionsDir();
            if (!dir) return;
            let recovered = 0;
            for (const key of keys) {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (!data.id) continue;
                    const filename = `Campfire_${data.id}.json`;
                    const fh = await dir.getFileHandle(filename, { create: true });
                    const w = await fh.createWritable();
                    await w.write(JSON.stringify(data, null, 2));
                    await w.close();
                    localStorage.removeItem(key);
                    recovered++;
                } catch(e) {}
            }
            if (recovered > 0) {
                showToast(`已恢复 ${recovered} 条临时备份到档案库`);
                loadVaultHistory();
            }
        }

        async function loadVaultHistory() {
            if (!vaultHandle) return;
            if (!(await verifyPermission(vaultHandle, true))) return;

            const list = document.getElementById('historyList');
            list.innerHTML = '';
            let files = [];
            const dir = await getSessionsDir();
            if (!dir) { list.innerHTML = '<div class="text-xs text-gray-600 italic">无法访问 sessions 目录。</div>'; return; }
            for await (const entry of dir.values()) {
                if (entry.kind === 'file' && entry.name.endsWith('.json')) files.push(entry);
            }

            files.sort((a, b) => b.name.localeCompare(a.name));
            if(files.length === 0) { list.innerHTML = '<div class="text-xs text-gray-600 italic">Vault 为空。</div>'; return; }

            for (const fileHandle of files) {
                const file = await fileHandle.getFile();
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    if(data.id && data.title) {
                        const dateStr = new Date(parseInt(data.id)).toLocaleString('zh-CN', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
                        const itemHtml = `
                            <div class="session-item group flex justify-between items-center p-2 bg-gray-900 border border-gray-800 rounded hover:bg-gray-800 hover:border-orange-900/50 cursor-pointer transition" data-id="${data.id}" data-filename="${escapeHtml(fileHandle.name)}">
                                <div class="truncate flex-grow session-load-btn">
                                    <div class="session-title-text text-xs font-bold text-gray-300 truncate group-hover:text-orange-500 transition">${escapeHtml(data.title)}</div>
                                    <div class="text-[10px] text-gray-600 font-mono mt-1">${dateStr}</div>
                                </div>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition shrink-0">
                                    <button class="rename-btn text-gray-600 hover:text-orange-400 px-1 text-[10px]" title="重命名">✏️</button>
                                    <button class="delete-btn text-gray-600 hover:text-red-500 px-1" title="删除">✕</button>
                                </div>
                            </div>`;
                        list.innerHTML += itemHtml;
                    }
                } catch(e) {}
            }

            list.onclick = (e) => {
                const item = e.target.closest('.session-item');
                if (!item) return;
                const filename = item.getAttribute('data-filename');
                if (e.target.classList.contains('delete-btn')) {
                    deleteSession(filename, e);

                }

        }

                        appendUserMessageDOM(session, b.text);
                    } else if (b.type === 'synthesis') {
                        const targetId = createSynthesisBlockDOM(session, b.runId, b.isSimple);
                        if (b.markdown) {
                            renderSynthesisAsBlocks(session, b.markdown, b.runId, { sessionTitle: title, type: b.isSimple ? 'simple' : 'campfire', runId: b.runId });

        let _memoryIndexCache = [];

        async function loadMemoryIndex() {

        async function saveMemoryIndex(index) {
            if (index.length > 100) index = index.slice(-100);
            _memoryIndexCache = index;
            if (!vaultHandle) return;
            try {
                const fh = await vaultHandle.getFileHandle('memory.json', { create: true });
                const w = await fh.createWritable();

        }

        async function buildMemoryEntry(session) {
            const synthesis = session.data.last_synthesis;
            if (!synthesis || synthesis.length < 50) return;
            const sessionId = session.data.id;
            // Skip if already indexed
            const index = getMemoryIndex();
            if (index.some(e => e.id === sessionId)) return;

            // Use scan model (cheap) to extract keywords
            try {
                const resp = await fetch(`${(config?.baseUrl || '').replace(/\/+$/, '')}/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config?.apiKey || ''}` },
                    body: JSON.stringify({
                        model: config.models.scan,
                        messages: [{ role: 'user', content: `从以下文本中提取5-8个关键词和一句话概括(20字内)。严格按JSON输出，不要其他内容：{"keywords":["词1","词2"],"gist":"一句话概括"}\n\n${synthesis.substring(0, 2000)}` }],
                        temperature: 0, max_tokens: 200, stream: false
                    })
                });
                const data = await resp.json();
                const raw = data.choices?.[0]?.message?.content || '';
                const jsonMatch = raw.match(/\{[\s\S]*\}/);
                if (!jsonMatch) return;
                const parsed = JSON.parse(jsonMatch[0]);

                index.push({
                    id: sessionId,
                    title: session.title || session.data.title || '',
                    keywords: parsed.keywords || [],
                    gist: parsed.gist || '',
                    synthesis: synthesis.substring(0, 1500),
                    timestamp: Date.now()
                });
                saveMemoryIndex(index);
            } catch(e) { console.error('Memory index build failed', e); }
        }

        function findRelevantMemory(userInput) {
            if (!userInput || userInput.length < 4) return null;
            const index = getMemoryIndex();
            if (index.length === 0) return null;

            // Simple keyword overlap scoring
            const inputChars = userInput.toLowerCase();
            const scored = index.map(entry => {
                let score = 0;
                (entry.keywords || []).forEach(kw => {
                    if (inputChars.includes(kw.toLowerCase())) score += 3;
                });
                // Title match
                if (entry.title && inputChars.includes(entry.title.substring(0, 8).toLowerCase())) score += 2;
                // Gist overlap
                if (entry.gist) {
                    const gistChars = entry.gist.toLowerCase();
                    // Count shared 2-grams
                    for (let i = 0; i < inputChars.length - 1; i++) {
                        if (gistChars.includes(inputChars.substring(i, i + 2))) score += 0.1;
                    }
                }
                return { ...entry, score };
            }).filter(e => e.score >= 2).sort((a, b) => b.score - a.score);

            if (scored.length === 0) return null;
            const top = scored.slice(0, 2);
            return top.map(e => `--- 「${e.title}」(${new Date(e.timestamp).toLocaleDateString('zh-CN')}) ---\n${e.synthesis}`).join('\n\n');
        }

        // v6.0: saveSessionToVault takes a session parameter
        // Fast incremental save — localStorage only, no permission needed, called after each step
        function saveSessionIncremental(session) {
            if (!session?.data?.id) return;
            try { localStorage.setItem(`campfire_backup_${session.data.id}`, JSON.stringify(session.data)); } catch(e) {}
        }

        async function saveSessionToVault(session) {
            if (!session.data.id) return;
            // Emergency backup to localStorage (always works, no permission needed)
            try { localStorage.setItem(`campfire_backup_${session.data.id}`, JSON.stringify(session.data)); } catch(e) {}

            if (!vaultHandle) return;
            // Try to write to vault
            try {
                if (!(await verifyPermission(vaultHandle, true))) {
                    showToast('档案库权限未授权 — 数据已临时备份到浏览器，请点击 ☰ 档案库 恢复权限');
                    return;
                }
                const dir = await getSessionsDir();
                if (!dir) { showToast('无法访问 sessions 目录'); return; }
                const filename = `Campfire_${session.data.id}.json`;
                const fileHandle = await dir.getFileHandle(filename, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(session.data, null, 2));
                await writable.close();
                // Vault save succeeded, remove emergency backup
                localStorage.removeItem(`campfire_backup_${session.data.id}`);
                loadVaultHistoryDebounced();
                showToast('已保存到档案库');
                buildMemoryEntry(session).catch(() => {});
            } catch(e) {
                console.error("Save failed", e);
                showToast('档案库保存失败 — 数据已临时备份到浏览器');
            }
        }

        // ==========================================
        // 17. V6.0 CLEANUP OLD SESSIONS (DOM only)
        // ==========================================
        function cleanupOldSessions() {
            const MAX_DOM_SESSIONS = 8;
            const allSessions = Array.from(sessionManager.sessions.values());
            if (allSessions.length <= MAX_DOM_SESSIONS) return;

            // Find completed/failed sessions beyond the limit (keep newest)
            const finishedSessions = allSessions
                .filter(s => s.status === 'complete' || s.status === 'failed')
                .sort((a, b) => {
                    // Sort by creation time (id contains timestamp)
                    return a.id.localeCompare(b.id);
                });

            const toRemove = finishedSessions.slice(0, finishedSessions.length - MAX_DOM_SESSIONS + sessionManager.runningSessions.size + sessionManager.sessionQueue.length);

            toRemove.forEach(s => {
                if (s.id === sessionManager.activeSessionId) return;
                if (s.logContainerEl) s.logContainerEl.remove();
                if (s.renderContainerEl) s.renderContainerEl.remove();
                if (s.tabEl) s.tabEl.remove();
                // Clean up pin text store for this session
                for (const key of _logPinTextStore.keys()) {
                    if (key.startsWith(s.id)) {
                        _logPinTextStore.delete(key);
                    }
                }
                sessionManager.sessions.delete(s.id);
            });
        }

        // Simple string hash for dedup
        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
            return h.toString(36);
        }

        function makeExportFilename(session, type, ext) {
            const title = (session.title || '未命名').replace(/[\\/:*?"<>|]/g, '_').substring(0, 30);
            const date = new Date().toISOString().slice(0, 10);
            return `${date}_${title}_${type}.${ext || 'md'}`;
        }

        async function exportToVault(content, baseFilename) {
            const dir = await getExportsDir();
            if (!dir) {
                try {
                    const h = await window.showSaveFilePicker({ suggestedName: baseFilename, types: [{ accept: { 'text/markdown': ['.md'] } }] });
                    const w = await h.createWritable(); await w.write(content); await w.close();
                } catch(e) { if(e.name !== 'AbortError') showToast('导出失败'); }
                return;
            }
            try {
                // Check for existing versions, find next version number
                const ext = baseFilename.includes('.') ? baseFilename.split('.').pop() : 'md';
                const base = baseFilename.replace(/\.[^.]+$/, '');
                let version = 1;
                const existing = [];
                for await (const entry of dir.values()) {
                    if (entry.kind === 'file' && entry.name.startsWith(base)) existing.push(entry);
                }
                // Check if latest existing file has identical content
                if (existing.length > 0) {
                    existing.sort((a, b) => b.name.localeCompare(a.name));
                    try {
                        const lastFile = await existing[0].getFile();
                        const lastContent = await lastFile.text();
                        if (lastContent === content) {
                            showToast('内容无变化，跳过导出');
                            return;
                        }
                    } catch(e) {}
                    // Find next version
                    for (const e of existing) {
                        const vMatch = e.name.match(/_v(\d+)\./);
                        if (vMatch) version = Math.max(version, parseInt(vMatch[1]) + 1);
                        else version = Math.max(version, 2); // first file has no _v, next is _v2
                    }
                }
                const filename = existing.length === 0 ? baseFilename : `${base}_v${version}.${ext}`;
                const fh = await dir.getFileHandle(filename, { create: true });
                const w = await fh.createWritable(); await w.write(content); await w.close();
                showToast(`已导出 exports/${filename}`);
            } catch(e) { showToast('导出失败: ' + e.message); }
        }

        // ==========================================
        // 20. V6.0 RESIZABLE PANELS
        // ==========================================
        function setupResizeHandle(handleEl, leftEl, rightEl) {
            let startX, startLeftWidth, startRightWidth;

            handleEl.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX;
                startLeftWidth = leftEl.getBoundingClientRect().width;
                startRightWidth = rightEl.getBoundingClientRect().width;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';

                const onMouseMove = (e) => {
                    const dx = e.clientX - startX;
                    const totalWidth = startLeftWidth + startRightWidth;
                    const newLeftWidth = Math.max(200, Math.min(totalWidth - 200, startLeftWidth + dx));
                    const newRightWidth = totalWidth - newLeftWidth;
                    leftEl.style.flex = `0 0 ${newLeftWidth}px`;
                    rightEl.style.flex = `0 0 ${newRightWidth}px`;
                };

                const onMouseUp = () => {
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            });
        }

        // ==========================================
        // 21. V6.0 INITIALIZATION
        // ==========================================
        // Populate model datalist
        const _dl = document.getElementById('modelList');
        MODEL_REGISTRY.forEach(m => { const o = document.createElement('option'); o.value = m; _dl.appendChild(o); });

        loadUI();

        // Draft persistence: restore on load, autosave on type, clear on send
        const _savedDraft = localStorage.getItem('campfire_input_draft');
        if (_savedDraft) document.getElementById('userInput').value = _savedDraft;
        let _draftTimer;
        document.getElementById('userInput').addEventListener('input', () => {
            clearTimeout(_draftTimer);
            _draftTimer = setTimeout(() => localStorage.setItem('campfire_input_draft', document.getElementById('userInput').value), 500);
        });

        // Setup resize handle between crucible and right panel
        setupResizeHandle(
            document.getElementById('resizeHandle'),
            document.getElementById('crucibleSection'),
            document.getElementById('rightPanel')
        );

        // Warn before leaving if sessions are running
        window.addEventListener('beforeunload', (e) => {
            if (sessionManager.runningSessions.size > 0) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // v6.0 Workspace model: create initial empty session on page load

            document.getElementById('settingsPanel').classList.add('open');

        }
