<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Campfire Cockpit v6.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #050505; color: #D1D1D1; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .crucible-log { height: calc(100vh - 250px); overflow-y: auto; scroll-behavior: auto; }
        .blueprint-render { height: calc(100vh - 250px); overflow-y: auto; scroll-behavior: smooth; }
        .blueprint-render .prose { font-size: 0.8125rem; line-height: 1.6; }
        .blueprint-render .prose h2 { font-size: 0.9375rem; }
        .blueprint-render .prose h3 { font-size: 0.875rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .settings-panel { transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .settings-panel.open { transform: translateX(0); }
        .history-panel { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .history-panel.open { transform: translateX(0); }

        .stream-box { background: #000; padding: 14px; border-radius: 8px; border: 1px solid #222; margin-top: 10px; white-space: pre-wrap; font-size: 0.875rem !important; color: #bbb; line-height: 1.6; position: relative; }

        .prose table { display: table !important; width: 100% !important; border-collapse: collapse !important; margin: 1rem 0 !important; background-color: #0c0c0c !important; border: 1px solid #333 !important; font-size: 0.85rem; }
        .prose th, .prose td { border: 1px solid #333 !important; padding: 8px !important; text-align: left; }

        .prose h1 { color: #F97316; font-size: 1.6rem; font-weight: 900; border-bottom: 2px solid #333; padding-bottom: 0.6rem; margin-top: 0; }
        .prose h2 { color: #E5E5E5; font-size: 1.3rem; font-weight: 800; margin-top: 2rem; border-left: 5px solid #F97316; padding-left: 12px; }
        .prose h3 { color: #A3A3A3; font-size: 1.1rem; font-weight: 700; margin-top: 1.5rem; }
        .prose strong { color: #fff; font-weight: 800; }
        .prose ul { margin-top: 0.5rem; margin-bottom: 1rem; list-style-type: square; padding-left: 1.2rem; }
        .prose li { margin-bottom: 0.4rem; }
        .prose p { margin-bottom: 1rem; }
        .prose code { color: #F97316; background: #1a1a1a; padding: 2px 5px; border-radius: 4px; font-size: 0.9em; }

        #userInput { resize: none; }
        #userInput::-webkit-scrollbar { width: 4px; }
        .toggle-checkbox:checked { right: 0; border-color: #F97316; }
        .toggle-checkbox:checked + .toggle-label { background-color: #F97316; }


        /* v6.0: Tab strip */
        #tabStrip { width: 130px; min-width: 130px; background: #080808; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; padding-top: 8px; gap: 4px; overflow-y: auto; overflow-x: hidden; padding: 8px 6px; }
        #tabStrip::-webkit-scrollbar { width: 3px; }
        .session-tab { width: 100%; height: auto; border-radius: 8px; display: flex; flex-direction: column; cursor: pointer; position: relative; font-size: 14px; font-weight: 900; transition: all 0.2s; border: 1px solid transparent; flex-shrink: 0; padding: 6px 8px; gap: 2px; }
        .session-tab.active { border-color: #F97316; box-shadow: 0 0 12px rgba(249,115,22,0.3); }
        .session-tab.queued { background: #1a1a1a; color: #666; }
        .session-tab.running { background: #2d1800; color: #F97316; }
        .session-tab.complete { background: #002200; color: #22c55e; }
        .session-tab.failed { background: #220000; color: #ef4444; }
        .session-tab.interrupted { background: #1a1000; color: #f59e0b; }
        .session-tab .tab-badge { font-size: 9px; font-weight: 700; opacity: 0.7; }
        .session-tab .tab-title { font-size: 10px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: inherit; }
        .session-tab .tab-timer { font-size: 10px; font-family: ui-monospace, monospace; opacity: 0.6; }
        .session-tab.queued .tab-badge { color: #999; }
        .session-tab.running .tab-badge { color: #F97316; }
        .session-tab.complete .tab-badge { color: #22c55e; }
        .session-tab.failed .tab-badge { color: #ef4444; }
        .session-tab.interrupted .tab-badge { color: #f59e0b; }
        @keyframes pulse-badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* v6.0: Session container show/hide */
        .session-log-container, .session-render-container { display: none; height: 100%; }
        .session-log-container.active-session, .session-render-container.active-session { display: flex; flex-direction: column; }

        /* v6.0: Right panel sub-tabs - REMOVED in v6.0 simplification */

        /* v6.0: Pinnable blocks */
        .pinnable-block { position: relative; padding: 16px; margin-bottom: 12px; background: #0c0c0c; border: 1px solid #1a1a1a; border-radius: 8px; }

        /* v6.2: Pinned excerpts in right panel */
        .pinned-excerpt { border-left: 3px solid #1e3a5f; }
        .pinned-excerpt .pinned-body { background: #060c18; border: 1px solid rgba(59,130,246,0.2); padding: 16px; border-radius: 0 8px 8px 8px; }

        /* v6.4: Input chip toolbar */
        .input-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; border: 1px solid #374151; background: transparent; color: #6b7280; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; user-select: none; }
        .input-chip:hover { border-color: #4b5563; color: #9ca3af; }
        .input-chip.active { border-color: #0e7490; background: rgba(8,145,178,0.12); color: #22d3ee; }
        .input-chip.active:hover { background: rgba(8,145,178,0.2); }
        .input-chip.disabled { opacity: 0.35; cursor: default; }

        /* v6.2: Crucible log icon buttons (top-right of stream box, hover-visible) */
        .log-btn-bar { position: absolute; top: 6px; right: 6px; display: flex; gap: 3px; opacity: 0; transition: opacity 0.15s; z-index: 2; }
        .stream-box:hover .log-btn-bar { opacity: 1; }
        .log-copy-btn, .log-pin-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; background: rgba(10,10,10,0.85); border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 13px; color: #666; transition: all 0.15s; padding: 0; line-height: 1; }
        .log-copy-btn:hover { color: #ccc; border-color: #555; }
        .log-pin-btn:hover { color: #F97316; border-color: #F97316; }

        /* v6.0: Resize handle between panels */
        .resize-handle {
            width: 4px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover, .resize-handle:active {
            background: #F97316;
        }

        /* Cancel button for running sessions */
        .cancel-session-btn { font-size: 9px; color: #ef4444; background: #1a0000; border: 1px solid #440000; padding: 2px 8px; border-radius: 4px; cursor: pointer; margin-left: 8px; }
        .cancel-session-btn:hover { background: #330000; }

        /* v6.0: Tab close button */
        .tab-close-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            display: none;
            background: #1a1a1a;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            line-height: 14px;
            text-align: center;
            z-index: 5;
        }
        .session-tab:hover .tab-close-btn {
            display: block;
        }
        .tab-close-btn:hover {
            color: #ef4444;
            background: #330000;
        }

        /* v6.0: Collapsible stream boxes */
        .stream-collapse-wrapper.collapsed .stream-box {
            max-height: 4.5em;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }
        .stream-collapse-toggle {
            display: block;
            width: 100%;
            text-align: center;
            padding: 4px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 11px;
            cursor: pointer;
            margin-top: 2px;
        }
        .stream-collapse-toggle:hover {
            color: #F97316;
        }

        /* v6.0: Workspace empty tab */
        .session-tab.empty { background: #111; color: #555; }
        .session-tab.empty .tab-badge { color: #555; }
    </style>
</head>
<body class="px-2 py-2 overflow-hidden flex flex-col h-screen">

    <header class="flex items-center justify-between pb-3 border-b border-gray-800 mb-3 shrink-0">
        <div class="flex items-center gap-3">
            <button id="toggleHistory" class="flex items-center justify-center bg-gray-900 hover:bg-gray-800 text-gray-400 hover:text-white border border-gray-700 transition-all rounded px-3 py-1.5 text-xs font-black uppercase tracking-widest shadow-inner">
                ☰ 档案库
            </button>
            <button id="newSessionBtn" class="flex items-center justify-center bg-orange-900/20 hover:bg-orange-900/40 text-orange-500 border border-orange-900/50 transition-all rounded px-3 py-1.5 text-xs font-black uppercase tracking-widest shadow-inner">
                ➕ New
            </button>
            <div class="flex items-center gap-2 border-l border-gray-800 pl-4 ml-2">
                <span id="logoIcon" class="text-2xl animate-pulse text-orange-600">🔥</span>
                <h1 class="text-xl font-black tracking-tighter text-white uppercase hidden xl:block tracking-widest">Campfire <span class="text-orange-600">v6.7</span></h1>
            </div>
        </div>

        <div id="statusCenter" class="hidden flex items-center justify-center shadow-lg transition-opacity duration-300">
            <span id="liveStatus" class="bg-orange-900/20 text-orange-500 border border-orange-900/50 text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-l-md">等待点火</span>
            <span id="liveTimer" class="bg-gray-900 text-gray-300 border-t border-r border-b border-gray-800 text-xs font-mono font-bold px-4 py-1.5 rounded-r-md">00:00</span>
            <button id="cancelActiveBtn" class="cancel-session-btn hidden">停止</button>
        </div>

        <div class="flex gap-4 items-center text-[10px] font-bold text-gray-500 uppercase">
            <div class="flex items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-lg border border-gray-800 cursor-pointer" id="modeToggleWrapper" title="篝火模式: 双心智博弈 + Scan差分 + Judge合成&#10;极简模式: 单一模型直接输出">
                <div class="relative inline-block w-8 mr-1 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="modeToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-4 border-gray-700 appearance-none cursor-pointer transition-all duration-300 top-0 left-0 checked:left-4 z-10" checked/>
                    <label for="modeToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-700 cursor-pointer transition-colors duration-300"></label>
                </div>
                <span id="toggleText" class="text-orange-500 ml-1">篝火模式</span>
            </div>
            <div class="flex items-center gap-2 hidden sm:flex" id="roundSelectorWrapper">
                <span>轮数:</span>
                <select id="maxRounds" class="bg-gray-900 border border-gray-800 rounded px-2 py-1 outline-none text-orange-500">
                    <option value="1">1 R</option>
                    <option value="2">2 R</option>
                    <option value="3" selected>3 R</option>
                    <option value="5">5 R</option>
                </select>
            </div>
            <button id="toggleSettings" class="hover:text-white transition border border-gray-800 bg-gray-900 px-4 py-1.5 rounded-lg">⚙ 设置</button>
        </div>
    </header>

    <div id="metricsBar" class="hidden shrink-0 flex justify-between items-center bg-orange-950/30 border border-orange-900/50 text-orange-400 text-[10px] font-bold px-4 py-2 rounded-lg mb-4 tracking-widest uppercase shadow-inner">
        <span class="flex items-center gap-2"><span class="text-green-500 text-sm">●</span> 完成</span>
        <span id="metricsContent" class="font-mono text-gray-300"></span>
    </div>

    <main class="flex gap-0 flex-grow overflow-hidden relative">

        <!-- v6.0: History panel overlay (unchanged from v5.2) -->
        <div id="historyPanel" class="history-panel absolute top-0 left-0 w-full md:w-[350px] h-full bg-[#080808] border-r border-gray-800 z-40 p-4 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2 shrink-0">
                <h2 class="text-sm font-black tracking-widest text-gray-300 uppercase">Vault 物理档案</h2>
                <button id="closeHistory" class="text-lg hover:text-white transition text-gray-500">✕</button>
            </div>
            <div id="drawerVaultStatus" class="text-[10px] text-gray-500 mb-4 p-2 bg-gray-900/50 border border-gray-800 rounded font-mono">
                当前状态: 未挂载 (请前往 ⚙ 设置 配置)
            </div>
            <div id="historyList" class="flex-grow overflow-y-auto space-y-2 pr-2"></div>
        </div>

        <!-- v6.0: Tab strip (left edge, 48px) -->
        <div id="tabStrip">
            <div id="tabList"></div>
        </div>

        <!-- v6.0: Crucible area (flex-3) -->
        <section id="crucibleSection" class="flex flex-col gap-4 h-full flex-[3] min-h-0 min-w-0 px-1">
            <div id="crucibleLogHost" class="crucible-log flex-grow bg-[#0A0A0A] p-4 border border-gray-800 rounded-xl font-mono leading-relaxed shadow-inner overflow-hidden relative">
                <!-- Session log containers inserted here dynamically -->
            </div>
            <div class="flex flex-col gap-1.5 shrink-0">
                <div class="flex gap-2 items-end">
                    <textarea id="userInput" rows="2" placeholder="输入意图... (Enter / Ctrl+Enter 点火 | Shift+Enter 换行)" class="flex-grow bg-gray-900/80 p-3 rounded-lg border border-gray-700 focus:border-orange-600 outline-none transition text-white text-sm"></textarea>
                    <button id="sendBtn" class="bg-orange-600 hover:bg-orange-500 px-8 py-4 rounded-lg font-black transition text-black h-[52px] shadow-lg">IGNITE</button>
                </div>
                <!-- Input chip toolbar -->
                <div class="flex items-center gap-2 pl-0.5">
                    <button id="searchChip" title="联网搜索 — 在设置中配置搜索模型" class="input-chip">🌐 联网</button>
                    <button id="attachBtn" title="附加文件 (.txt, .md, .json, .csv 等)" class="input-chip">📎 附件</button>
                    <input type="file" id="attachInput" class="hidden" accept=".txt,.md,.markdown,.json,.csv,.xml,.html,.htm,.js,.ts,.py,.java,.c,.cpp,.h,.css,.yaml,.yml,.toml,.ini,.cfg,.log,.sql,.sh,.bat,.ps1,.r,.go,.rs,.rb,.php,.swift,.kt" multiple>
                </div>
                <div id="attachedFiles" class="flex flex-wrap gap-1.5 pl-0.5 empty:hidden"></div>
            </div>
        </section>

        <!-- v6.0: Resize handle -->
        <div id="resizeHandle" class="resize-handle"></div>

        <!-- v6.0: Right panel (flex-2) — session output view -->
        <section id="rightPanel" class="flex flex-col gap-2 h-full flex-[2] min-h-0 min-w-0">
            <!-- Session output area -->
            <div id="sessionRenderHost" class="blueprint-render flex-grow bg-[#050505] p-2 overflow-hidden pr-4 relative">
                <!-- Session render containers inserted here dynamically -->
            </div>

            <!-- Pending follow-up bar -->
            <div id="pendingBar" class="hidden shrink-0 mx-2 px-3 py-2 bg-yellow-900/10 border border-yellow-800/50 rounded-lg flex items-center gap-2">
                <span class="text-yellow-500 text-xs shrink-0">📝</span>
                <input type="text" id="pendingInput" class="flex-grow bg-transparent border-none outline-none text-[11px] text-yellow-400/90 placeholder-yellow-800" placeholder="待处理追问...">
                <button id="pendingCancelBtn" class="text-[10px] text-gray-600 hover:text-red-400 shrink-0 transition" title="取消">✕</button>
            </div>

            <!-- Export buttons -->
            <div id="sessionExportBtns" class="flex gap-1.5 shrink-0 px-2">
                <button id="exportFullBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-[10px] font-bold transition text-gray-400 border border-gray-700">📚 导出对话</button>
                <button id="exportStructBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-[10px] font-bold transition text-gray-400 border border-gray-700">📋 结构化归档</button>
                <button id="exportPresentBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2.5 rounded-lg text-[10px] font-bold transition text-gray-400 border border-gray-700">🎬 生成 HTML 演示</button>
            </div>
        </section>
    </main>

    <!-- Settings panel (unchanged structure, added concurrency) -->
    <div id="settingsPanel" class="settings-panel fixed top-0 right-0 w-full md:w-1/2 lg:w-1/3 h-full bg-black border-l border-gray-800 z-50 shadow-2xl overflow-y-auto flex flex-col">
        <div class="sticky top-0 z-10 bg-black border-b border-gray-800 px-6 pt-5 pb-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black tracking-widest text-orange-500 uppercase">设置</h2>
                <button id="closeSettings" class="text-2xl hover:text-white transition">✕</button>
            </div>
            <div class="flex gap-2 mt-3">
                <button id="resetDefaultsBtn" class="text-[10px] text-gray-500 hover:text-red-400 border border-gray-700 hover:border-red-900 bg-gray-900/50 px-3 py-1.5 rounded transition">↺ 恢复默认</button>
                <button id="exportGlobalBtn" class="text-[10px] text-gray-500 hover:text-gray-300 border border-gray-700 bg-gray-900/50 px-3 py-1.5 rounded transition">导出配置</button>
                <button id="importGlobalBtn" class="text-[10px] text-gray-500 hover:text-gray-300 border border-gray-700 bg-gray-900/50 px-3 py-1.5 rounded transition">导入配置</button>
            </div>
        </div>
        <div class="space-y-6 px-6 py-6 pb-20">

            <div class="bg-purple-900/10 p-4 rounded-lg border border-purple-900/30">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-[10px] font-bold text-purple-400 uppercase tracking-widest">物理存储 (Local Vault)</label>
                    <button id="mountVaultBtnSetting" class="bg-purple-900/40 hover:bg-purple-900/60 text-purple-300 text-[10px] px-3 py-1 rounded border border-purple-800 transition">📂 挂载目录</button>
                </div>
                <div id="settingVaultStatus" class="text-[10px] text-gray-500 font-mono">状态: 未挂载</div>
            </div>

            <!-- v6.0: Concurrency setting -->
            <div class="bg-orange-900/10 p-4 rounded-lg border border-orange-900/30">
                <label class="block text-[10px] font-bold text-orange-400 uppercase tracking-widest mb-2">并发会话 (Concurrency)</label>
                <div class="flex items-center gap-3">
                    <select id="maxConcurrency" class="bg-black border border-gray-800 rounded px-3 py-1.5 outline-none text-orange-500 text-xs">
                        <option value="1">1 (顺序)</option>
                        <option value="2">2 (并行)</option>
                        <option value="3" selected>3 (最大)</option>
                    </select>
                    <span class="text-[9px] text-gray-600">可同时开多个对话并行分析不同问题</span>
                </div>
            </div>

            <div class="bg-gray-900/40 p-4 rounded-lg border border-blue-900/30">
                <label class="block text-[10px] font-bold text-blue-400 mb-2 uppercase">算力资产 (API & Models)</label>
                <input type="text" id="baseUrl" class="w-full bg-black p-2 rounded mb-2 border border-gray-800 text-xs text-white" placeholder="API 地址">
                <div class="flex gap-2 mb-4">
                    <input type="password" id="apiKey" class="flex-1 bg-black p-2 rounded border border-gray-800 text-xs text-white" placeholder="API Key">
                    <button id="testConnectionBtn" class="bg-black border border-gray-700 text-[10px] text-gray-500 hover:text-green-400 hover:border-green-900 px-3 rounded transition whitespace-nowrap">⚡ 测试</button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-[10px] text-gray-500">
                    <div><label>Mind 1 ID</label><input type="text" id="modelAlpha" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded text-blue-300"></div>
                    <div><label>Mind 2 ID</label><input type="text" id="modelBeta" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded"></div>
                    <div><label>Scan ID</label><input type="text" id="modelScan" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded"></div>
                    <div><label>Synthesis ID</label><input type="text" id="modelJudge" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded"></div>
                    <div><label>Writer ID</label><input type="text" id="modelWriter" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded text-purple-300"></div>
                </div>
                <!-- Web search model config -->
                <div class="mt-3 pt-3 border-t border-gray-800">
                    <label class="text-[10px] text-gray-400 uppercase tracking-widest block mb-2">🌐 联网搜索模型</label>
                    <div class="grid grid-cols-[1fr] gap-2 items-center">
                        <input type="text" id="modelSearch" list="modelList" class="w-full bg-black border border-gray-800 p-2 rounded text-[11px] text-cyan-300" placeholder="搜索模型 ID，如 gpt-4o-search-preview">
                    </div>
                </div>
                <datalist id="modelList"></datalist>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-end border-b border-gray-800 pb-2">
                    <label class="block text-[10px] font-bold text-orange-500 uppercase tracking-widest">智力资产 (Prompt Directives)</label>
                </div>
                <div><label class="block text-[10px] font-bold text-blue-400 mb-1">Mind 共享指令 (α &amp; β)</label><textarea id="promptAlpha" class="w-full bg-black p-2 rounded border border-gray-800 text-[10px] text-gray-400 h-40 leading-relaxed"></textarea></div>
                <div><label class="block text-[10px] font-bold text-green-500 mb-1">差分引导指令</label><textarea id="promptScan" class="w-full bg-black p-2 rounded border border-gray-800 text-[10px] text-gray-400 h-40 leading-relaxed"></textarea></div>
                <div><label class="block text-[10px] font-bold text-orange-500 mb-1">最终合成指令</label><textarea id="promptJudge" class="w-full bg-black p-2 rounded border border-orange-900/30 text-[10px] text-orange-300 h-56 leading-relaxed"></textarea></div>
            </div>

        </div>
    </div>

    <input type="file" id="importGlobalInput" class="hidden" accept=".json">

    <script>
        // ==========================================
        // 1. V6.0 SYSTEM PROMPTS (unchanged from v5.2)
        // ==========================================

            alpha: `你是协同思辨中的可攻击分析者。给出你最真实的判断——不受角色预设影响，允许被反驳和更新。

                if (session.status === 'empty' || session.title === '新工作区') {
                    session.title = userInput.substring(0, 15) + (userInput.length > 15 ? '...' : '');
                    session.data.title = session.title;
                    session.tabEl.title = session.title;
                    const titleEl = session.tabEl.querySelector('.tab-title');
                    if (titleEl) titleEl.textContent = session.title;
                }
            } else if (session && (session.status === 'running' || session.status === 'queued')) {
                // Queue as follow-up for this session
                session._pendingFollowUp = userInput;
                inputArea.value = '';
                localStorage.removeItem('campfire_input_draft');
                showToast('已排队，当前分析完成后自动继续');
                updatePendingBar(session);
                return;
            } else if (!session || session.status === 'failed' || session.status === 'interrupted') {
                // No active session or it's in a non-reusable state — create new
                session = createSession(userInput, isCampfire, maxRounds, false);
            }

            inputArea.value = '';
            localStorage.removeItem('campfire_input_draft');
            inputArea.focus();

            switchToSession(session.id);

            // Set to queued/running
            if (sessionManager.runningSessions.size < sessionManager.maxConcurrency) {
                startSession(session.id);
            } else {
                sessionManager.sessionQueue.push(session.id);
                session.status = 'queued';
                session.phase = '排队中 (#' + sessionManager.sessionQueue.length + ')';
                updateTabState(session);
                updateHeaderForSession(session);
            }
        }

        function handleNewSession() {
            const session = createSession('', true, 3, true);
            switchToSession(session.id);
            document.getElementById('userInput').focus();
        }

        function deleteSessionTab(sessionId) {
            const session = sessionManager.sessions.get(sessionId);
            if (!session) return;

            // Cannot delete a running session
            if (session.status === 'running') {
                appendToLogWithSmartScroll(session, `<p class="text-yellow-500 text-sm mt-2">[系统]: 请先取消正在运行的会话。</p>`);
                return;
            }

            // Remove DOM elements
            if (session.logContainerEl) session.logContainerEl.remove();
            if (session.renderContainerEl) session.renderContainerEl.remove();
            if (session.tabEl) session.tabEl.remove();

            // Remove from queue if queued
            sessionManager.sessionQueue = sessionManager.sessionQueue.filter(id => id !== sessionId);

            // Clean up pin text store
            for (const key of _logPinTextStore.keys()) {
                if (key.includes(sessionId)) {
                    _logPinTextStore.delete(key);
                }
            }

            // Remove from sessions map
            sessionManager.sessions.delete(sessionId);

            // If this was the active session, switch to another or create a new empty one
            if (sessionManager.activeSessionId === sessionId) {
                sessionManager.activeSessionId = null;
                const remaining = Array.from(sessionManager.sessions.keys());
                if (remaining.length > 0) {
                    switchToSession(remaining[remaining.length - 1]);
                } else {
                    handleNewSession();
                }
            }
        }

        function startSession(sessionId) {
            const session = sessionManager.sessions.get(sessionId);
            if (!session) return;
            session.status = 'running';
            session.phase = '启动中...';
            sessionManager.runningSessions.add(sessionId);
            updateTabState(session);
            if (session.id === sessionManager.activeSessionId) updateHeaderForSession(session);

            // Run ignition (async, no await — fires and forgets, drainQueue on finish)
            runIgnition(session.id).catch(() => {});
        }

        function drainQueue() {
            while (sessionManager.sessionQueue.length > 0 && sessionManager.runningSessions.size < sessionManager.maxConcurrency) {
                const nextId = sessionManager.sessionQueue.shift();
                const nextSession = sessionManager.sessions.get(nextId);
                if (nextSession && nextSession.status === 'queued') {
                    startSession(nextId);
                }
            }
            // Update queue positions
            sessionManager.sessionQueue.forEach((id, i) => {
                const s = sessionManager.sessions.get(id);
                if (s) { s.phase = '排队中 (#' + (i+1) + ')'; if (s.id === sessionManager.activeSessionId) updateHeaderForSession(s); }
            });
        }

        function stopSession(sessionId) {
            const session = sessionManager.sessions.get(sessionId);
            if (!session) return;

            if (session.status === 'queued') {
                sessionManager.sessionQueue = sessionManager.sessionQueue.filter(id => id !== sessionId);
                session.status = 'failed';
                session.phase = '已取消';
                updateTabState(session);
                if (session.id === sessionManager.activeSessionId) updateHeaderForSession(session);
                appendToLogWithSmartScroll(session, `<p class="text-red-500 font-bold mt-4">会话已从队列中移除。</p>`);
            } else if (session.status === 'running') {
                session._userStopped = true; // flag for catch block
                if (session.abortController) {
                    session.abortController.abort();
                }
            }
        }

        // ==========================================
        // 7. V6.0 STREAMING WITH ABORT SIGNAL
        // ==========================================
        async function callModelStream(model, sys, messages, onChunk, signal) {
            const fetchOptions = {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config?.apiKey || ''}` },
                body: JSON.stringify({ model, messages: [{ role: 'system', content: sys }, ...messages], temperature: 0.7, stream: true })
            };
            if (signal) fetchOptions.signal = signal;

            const resp = await fetch(`${(config?.baseUrl || '').replace(/\/+$/, '')}/chat/completions`, fetchOptions);
            if (!resp.ok) throw new Error(`[${model}] Error: ${resp.statusText}`);

            const reader = resp.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let fullText = "", buffer = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmedLine = line.trim();
                    if (trimmedLine.startsWith('data: ') && trimmedLine !== 'data: [DONE]') {
                        try { const d = JSON.parse(trimmedLine.substring(6)); const content = d.choices[0]?.delta?.content || ''; if (content) { fullText += content; onChunk(content, fullText); } } catch (e) {}
                    }
                }
            }
            buffer += decoder.decode();
            if (buffer.trim() && buffer.trim().startsWith('data: ') && buffer.trim() !== 'data: [DONE]') {
                try { const d = JSON.parse(buffer.trim().substring(6)); const content = d.choices[0]?.delta?.content || ''; if (content) { fullText += content; onChunk(content, fullText); } } catch (e) {}
            }
            return fullText;
        }

        async function callSearchStep(session, userInput, signal) {
            const searchModel = config.models.search;
            if (!config.searchEnabled || !searchModel) return null;
            setSessionStatus(session, '联网搜索...');
            appendToLogWithSmartScroll(session, `<p class="text-cyan-400 mt-6 text-[10px] font-bold uppercase tracking-widest">🔍 联网搜索...</p>`);
            const idSearch = `search_${session.id}_${Date.now()}`;
            appendToLogWithSmartScroll(session, `<div id="${idSearch}" class="stream-box text-cyan-300" style="border-color:#164e63;"></div>`);
            const searchBox = document.getElementById(idSearch);
            try {
                const result = await callModelStream(searchModel, SEARCH_PROMPT, [{ role: 'user', content: userInput }], (c) => appendTextWithSmartScroll(session, searchBox, c), signal);
                collapseStreamBox(searchBox, result.length);
                return result;
            } catch (e) {
                if (searchBox) searchBox.textContent = `[搜索失败: ${e.message}]`;
                return null;
            }
        }

        // ==========================================
        // 8. V6.0 SESSION-SCOPED IGNITION
        // ==========================================

        function collapseStreamBox(boxElement, charCount) {
            if (!boxElement) return;
            // Trim leading blank lines so collapsed preview shows actual content
            boxElement.innerText = boxElement.innerText.replace(/^\s*\n+/, '');
            const wrapper = document.createElement('div');
            wrapper.className = 'stream-collapse-wrapper collapsed';
            boxElement.parentNode.insertBefore(wrapper, boxElement);
            wrapper.appendChild(boxElement);

            const toggle = document.createElement('button');
            toggle.className = 'stream-collapse-toggle';
            toggle.setAttribute('data-charcount', charCount.toString());
            toggle.textContent = `\u25bc 展开全文 (${charCount.toLocaleString()}字)`;
            wrapper.appendChild(toggle);
        }

        async function resumeFromCheckpoint(sessionId) {
            const session = sessionManager.sessions.get(sessionId);
            if (!session || !session._checkpoint) return;
            const cp = session._checkpoint;
            session._checkpoint = null;
            session.status = 'running';
            session.abortController = new AbortController();
            const signal = session.abortController.signal;
            sessionManager.runningSessions.add(sessionId);
            updateTabState(session);
            startSessionTimer(session);

            appendToLogWithSmartScroll(session, `<p class="text-orange-400 mt-4 text-[10px] font-bold uppercase tracking-widest border-t border-orange-900 pt-4">🔄 断点续传中...</p>`);

            let { runId, startTime, sysAlpha, sysBeta, sysJudge, finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds } = cp;
            let historyA = cp.historyA || [], historyB = cp.historyB || [];

            try {
                if (cp.phase === 'simple') {
                    // Resume simple mode
                    setSessionStatus(session, '生成中...', 'simple');
                    const idSingle = `single_resume_${session.id}_${runId}`;
                    appendToLogWithSmartScroll(session, `<div class="mt-2"><div id="${idSingle}" class="stream-box text-gray-300"></div></div>`);
                    const boxSingle = document.getElementById(idSingle);
                    const renderTarget = createSynthesisBlockDOM(session, runId, true, null);
                    const finalSingle = await callModelStream(config.models.alpha, cp.sysAlpha, session.data.simple_history, (c, ft) => {
                        appendTextWithSmartScroll(session, boxSingle, c);
                        renderTargetWithSmartScroll(session, ft, renderTarget);
                    }, signal);
                    session.data.simple_history.push({ role: 'assistant', content: finalSingle });
                    session.data.last_synthesis = finalSingle;
                    session.data.rawMarkdownMap[runId] = finalSingle;
                    session.data.blocks.push({ type: 'synthesis', runId, isSimple: true, markdown: finalSingle });
                    renderSynthesisAsBlocks(session, finalSingle, runId, {});
                    injectPinButtonsForRound(session, 0, 'simple', finalSingle, runId, idSingle);
                    const tc = ((Date.now() - startTime) / 1000).toFixed(1);
                    appendToLogWithSmartScroll(session, `<p class="text-white font-bold mt-4 bg-blue-900/20 p-3 rounded border border-blue-800 text-sm">输出完成。</p>`);
                    session.status = 'complete';
                    session._metrics = { mode: 'simple', text: `模式: 极简单模 | 耗时: ${tc}s` };
                    setSessionStatus(session, '执行完成', 'done');
                } else {
                    // Resume campfire mode
                    const startRound = cp.phase === 'judge' ? maxRounds + 1 : cp.round;
                    const startPhase = cp.phase; // 'minds', 'scan', or 'judge'

                    for (let r = startRound; r <= maxRounds; r++) {
                        actualRounds = r;

                        // Skip minds if resuming from scan in the same round
                        if (!(r === startRound && startPhase === 'scan')) {
                            setSessionStatus(session, `对比分析 (R${r})`);
                            appendToLogWithSmartScroll(session, `<p class="text-orange-500 mt-6 font-bold border-b border-gray-800 pb-1">ROUND ${r}: 双模对比</p>`);
                            const idA = `a_resume_${session.id}_${runId}_r${r}`, idB = `b_resume_${session.id}_${runId}_r${r}`;
                            appendToLogWithSmartScroll(session, `<div class="grid grid-cols-2 gap-4 mt-2"><div><span class="text-blue-400 text-[10px] uppercase font-bold">Mind \u03b1 (R${r})</span><div id="${idA}" class="stream-box"></div></div><div><span class="text-purple-400 text-[10px] uppercase font-bold">Mind \u03b2 (R${r})</span><div id="${idB}" class="stream-box"></div></div></div>`);

                            session._checkpoint = { phase: 'minds', round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                            const boxA = document.getElementById(idA), boxB = document.getElementById(idB);
                            const [resA, resB] = await Promise.all([
                                callModelStream(config.models.alpha, sysAlpha, historyA, (c) => appendTextWithSmartScroll(session, boxA, c), signal),
                                callModelStream(config.models.beta, sysBeta, historyB, (c) => appendTextWithSmartScroll(session, boxB, c), signal)
                            ]);
                            finalA = resA; finalB = resB;
                            session.data.lastMindOutputs = { alpha: resA, beta: resB };
                            saveSessionIncremental(session);
                            injectPinButtonsForRound(session, r, 'mind1', finalA, runId, idA);
                            injectPinButtonsForRound(session, r, 'mind2', finalB, runId, idB);
                            collapseStreamBox(document.getElementById(idA), finalA.length);
                            collapseStreamBox(document.getElementById(idB), finalB.length);
                        }

                        setSessionStatus(session, `差分审计 (R${r}/${maxRounds})`);
                        appendToLogWithSmartScroll(session, `<p class="text-green-500 mt-4 text-[10px] font-bold uppercase tracking-widest">分析差异...</p>`);
                        const idS = `s_resume_${session.id}_${runId}_r${r}`;
                        appendToLogWithSmartScroll(session, `<div id="${idS}" class="stream-box text-green-700"></div>`);
                        session._checkpoint = { phase: 'scan', round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                        scanReport = await callModelStream(config.models.scan, directives.scan, [{ role: 'user', content: `MIND 1:\n${finalA}\n\nMIND 2:\n${finalB}` }], (c) => appendTextWithSmartScroll(session, document.getElementById(idS), c), signal);
                        injectPinButtonsForRound(session, r, 'scan', scanReport, runId, idS);
                        collapseStreamBox(document.getElementById(idS), scanReport.length);
                        session.data.lastScanReport = scanReport;
                        saveSessionIncremental(session);

                        const scoreMatch = scanReport.match(/\[分歧度评分:\s*(\d+)\/10\]/);
                        finalEntropy = scoreMatch ? parseInt(scoreMatch[1]) : 10;

                        // Check if scan requests clarification from user
                        const clarifyMatch = scanReport.match(/\[需要澄清:\s*(.+?)\]/);
                        if (clarifyMatch && r === 1) {
                            const clarifyQuestion = clarifyMatch[1];
                            appendToLogWithSmartScroll(session, `<p class="text-yellow-400 font-bold mt-2 p-3 border border-yellow-800 bg-yellow-900/10 rounded">⚠️ 问题边界模糊：${escapeHtml(clarifyQuestion)}</p>`);
                            appendToLogWithSmartScroll(session, `<div class="flex gap-2 mt-2"><input type="text" class="clarify-input flex-grow bg-gray-900 border border-yellow-800 rounded p-2 text-sm text-white outline-none focus:border-yellow-500" placeholder="补充说明..." data-session-id="${session.id}"><button class="clarify-submit bg-yellow-900/50 hover:bg-yellow-900 text-yellow-400 border border-yellow-800 px-4 rounded text-xs font-bold transition" data-session-id="${session.id}">补充并继续</button><button class="clarify-skip text-gray-500 hover:text-gray-300 border border-gray-700 px-3 rounded text-xs transition" data-session-id="${session.id}">跳过</button></div>`);
                            // Pause: store state for resumption after user input
                            session._clarifyState = { round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                            session.status = 'waiting_clarify';
                            session._roundProgress = null;
                            setSessionStatus(session, '等待补充...', 'normal');
                            updateTabState(session);
                            return; // exit runIgnition, will resume via clarify handler
                        }

                        if (finalEntropy < 4) {
                            appendToLogWithSmartScroll(session, `<p class="text-green-400 font-bold mt-2">>>> 双方观点基本一致 (一致度 ${(10-finalEntropy)*10}%)，跳过后续轮次。</p>`);
                            break;
                        } else if (r < maxRounds) {
                            appendToLogWithSmartScroll(session, `<p class="text-orange-400 font-bold mt-2">>>> 一致度 ${(10-finalEntropy)*10}%，继续下一轮对比。</p>`);
                            historyA.push({ role: 'assistant', content: finalA }, { role: 'user', content: `差分审计揭示了以下分歧：\n${scanReport}\n\n请开放整合这些信息。若你的判断有调整，明确说明改变了什么；若仍坚持，给出新的具体理由。` });
                            historyB.push({ role: 'assistant', content: finalB }, { role: 'user', content: `差分审计揭示了以下分歧：\n${scanReport}\n\n请开放整合这些信息。若你的判断有调整，明确说明改变了什么；若仍坚持，给出新的具体理由。` });
                        } else {
                            appendToLogWithSmartScroll(session, `<p class="text-red-400 font-bold mt-2">>>> 达到最大轮次 (一致度 ${(10-finalEntropy)*10}%)，进入综合。</p>`);
                        }
                    }

                    // Judge synthesis
                    session._roundProgress = null;
                    setSessionStatus(session, '生成结论...', 'pulse');
                    updateTabState(session);
                    appendToLogWithSmartScroll(session, `<p class="text-orange-500 mt-8 font-bold border-b border-gray-800 pb-1 uppercase tracking-widest">综合结论</p>`);
                    session._checkpoint = { phase: 'judge', runId, startTime, sysAlpha, sysBeta, sysJudge, finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                    const renderTarget = createSynthesisBlockDOM(session, runId, false, finalEntropy);
                    const judgeUserMsg = `意图: ${userInput}\nMIND 1:\n${finalA}\nMIND 2:\n${finalB}\nDIFF:\n${scanReport}`;
                    session._judgeInputs = { userMsg: judgeUserMsg, sysPrompt: sysJudge, runId, isSimple: false };
                    const synthesis = await callModelStream(config.models.judge, sysJudge, [{ role: 'user', content: judgeUserMsg }], (c, ft) => {
                        renderTargetWithSmartScroll(session, ft, renderTarget);
                    }, signal);

                    session.data.last_synthesis = synthesis;
                    session.data.rawMarkdownMap[runId] = synthesis;
                    session.data.full_conversation += `### 问题\n${userInput}\n\n### 综合结论\n${synthesis}\n\n---\n\n`;
                    saveSessionIncremental(session);
                    session.data.blocks.push({ type: 'synthesis', runId, isSimple: false, markdown: synthesis });
                    renderSynthesisAsBlocks(session, synthesis, runId, { sessionTitle: session.title, rounds: actualRounds, model: 'synthesis', type: 'campfire' });

                    const timeCost = ((Date.now() - startTime) / 1000).toFixed(1);
                    appendToLogWithSmartScroll(session, `<p class="text-white font-bold mt-6 bg-green-900/20 p-3 rounded border border-green-800 text-sm">分析完成。</p>`);
                    const convergenceRate = (10 - finalEntropy) * 10;
                    session.status = 'complete';
                    session._metrics = { mode: 'campfire', text: `对比: ${actualRounds} 轮 | 一致度: ${convergenceRate}% | 耗时: ${timeCost}s` };
                    setSessionStatus(session, '合成完毕', 'done');
                }

                session._checkpoint = null;
                await saveSessionToVault(session);
                session._savedToVault = true;
                updateTabState(session);
            } catch (err) {
                if (err.name === 'AbortError') {
                    if (session._userStopped) {
                        session.status = 'complete';
                        session._checkpoint = null;
                        session._userStopped = false;
                        appendToLogWithSmartScroll(session, `<p class="text-yellow-500 mt-4 p-2 border border-yellow-900 bg-yellow-900/10 text-sm">已停止，已生成内容已保留。</p>`);
                        setSessionStatus(session, '已停止', 'done');
                        await saveSessionToVault(session).catch(() => {});
                    } else {
                        session.status = 'failed';
                        session._checkpoint = null;
                        appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">已取消。</p>`);
                    }
                } else if (session._checkpoint) {
                    session.status = 'interrupted';
                    setSessionStatus(session, '已中断 — 可续传', 'normal');
                    appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">!! 中断: ${escapeHtml(err.message)}</p>`);
                    appendToLogWithSmartScroll(session, `<button class="resume-btn mt-2 bg-orange-900/30 hover:bg-orange-900/50 text-orange-400 border border-orange-800 px-4 py-2 rounded text-xs font-bold transition w-full" data-session-id="${session.id}">🔄 断点续传</button>`);
                } else {
                    session.status = 'failed';
                    setSessionStatus(session, '系统异常', 'normal');
                    appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">!! 错误: ${escapeHtml(err.message)}</p>`);
                }
            } finally {
                stopSessionTimer(session);
                sessionManager.runningSessions.delete(sessionId);
                session._roundProgress = null;
                updateTabState(session);
                if (session.id === sessionManager.activeSessionId) {
                    updateHeaderForSession(session);
                    updateMetricsForSession(session);
                }
                drainQueue();
                // Auto-run pending follow-up
                if (session._pendingFollowUp && (session.status === 'complete')) {
                    const followUp = session._pendingFollowUp;
                    session._pendingFollowUp = null;
                    updatePendingBar(session);
                    session.userInput = followUp;
                    startSession(session.id);
                }
            }
        }

        async function runIgnition(sessionId) {
            const session = sessionManager.sessions.get(sessionId);
            if (!session) return;

            const userInput = session.userInput;
            const isCampfire = session.isCampfire;
            const maxRounds = session.maxRounds;
            const metricsBar = document.getElementById('metricsBar');
            const metricsContent = document.getElementById('metricsContent');
            const isContinuation = session.data.blocks.length > 0;

            session.abortController = new AbortController();
            const signal = session.abortController.signal;

            try {
                const startTime = Date.now();
                const runId = Date.now().toString();

                if (!session.data.id) {
                    session.data.id = session.id.split('_')[0]; // timestamp part
                }
                session.data.timestamp = new Date().toISOString();
                session.data.title = session.title;

                session.data.blocks.push({ type: 'user', text: userInput });
                appendUserMessageDOM(session, userInput);
                startSessionTimer(session);

                // Web search (optional) — α and β each search independently in campfire mode
                const makeInject = (ctx) => ctx
                    ? `\n\n[联网搜索参考 — ${new Date().toLocaleDateString('zh-CN')}]\n${ctx}\n\n以上为搜索结果，优先用于校验「事实」层。`
                    : '';
                let sysAlpha = directives.alpha, sysBeta = directives.alpha, sysJudge = directives.judge;

                // Memory index: inject relevant past conclusions
                const memoryCtx = findRelevantMemory(userInput);
                if (memoryCtx) {
                    const memInject = `\n\n[历史记忆 — 以下为过往相关分析结论，仅供参考，不要盲从]\n${memoryCtx}`;
                    sysAlpha += memInject;
                    sysBeta += memInject;
                }

                if (config.searchEnabled && config.models.search) {
                    if (isCampfire) {
                        setSessionStatus(session, '联网搜索 (α + β)...');
                        appendToLogWithSmartScroll(session, `<p class="text-cyan-400 mt-6 text-[10px] font-bold uppercase tracking-widest">🔍 联网搜索 — α & β 各自检索...</p>`);
                        const idSA = `search_a_${session.id}_${runId}`, idSB = `search_b_${session.id}_${runId}`;
                        appendToLogWithSmartScroll(session, `<div class="grid grid-cols-2 gap-4 mt-2"><div><span class="text-blue-400 text-[10px] uppercase font-bold">α 检索</span><div id="${idSA}" class="stream-box text-cyan-300" style="border-color:#164e63;"></div></div><div><span class="text-purple-400 text-[10px] uppercase font-bold">β 检索</span><div id="${idSB}" class="stream-box text-cyan-300" style="border-color:#164e63;"></div></div></div>`);
                        const [ctxA, ctxB] = await Promise.all([
                            callModelStream(config.models.search, SEARCH_PROMPT, [{role:'user',content:userInput}], (c) => appendTextWithSmartScroll(session, document.getElementById(idSA), c), signal).catch(() => null),
                            callModelStream(config.models.search, SEARCH_PROMPT, [{role:'user',content:userInput}], (c) => appendTextWithSmartScroll(session, document.getElementById(idSB), c), signal).catch(() => null),
                        ]);
                        const boxSA = document.getElementById(idSA), boxSB = document.getElementById(idSB);
                        if (ctxA && boxSA) collapseStreamBox(boxSA, ctxA.length);
                        if (ctxB && boxSB) collapseStreamBox(boxSB, ctxB.length);
                        sysAlpha = directives.alpha + makeInject(ctxA);
                        sysBeta  = directives.alpha + makeInject(ctxB);
                        sysJudge = directives.judge + (ctxA || ctxB
                            ? `\n\n[联网搜索参考]\nMind α 的检索：\n${ctxA || '无'}\n\nMind β 的检索：\n${ctxB || '无'}`
                            : '');
                    } else {
                        // Simple mode: single search
                        const ctx = await callSearchStep(session, userInput, signal);
                        sysAlpha = directives.alpha + makeInject(ctx);
                        sysJudge = directives.judge + makeInject(ctx);
                    }
                }

                if (isContinuation) {
                    appendToLogWithSmartScroll(session, `<p class="text-gray-500 mt-4 text-[10px] uppercase tracking-widest border-t border-gray-800 pt-4">--- 继续推演 ---</p>`);
                }

                if (!isCampfire) {
                    // === SIMPLE MODE ===
                    setSessionStatus(session, '生成中...', 'simple');
                    appendToLogWithSmartScroll(session, `<p class="text-blue-400 mt-6 font-bold border-b border-gray-800 pb-1 uppercase tracking-widest">>>> [极简模式] 直接输出</p>`);
                    session.data.simple_history.push({ role: 'user', content: userInput });
                    const idSingle = `single_${session.id}_${runId}`;
                    appendToLogWithSmartScroll(session, `<div class="mt-2"><div id="${idSingle}" class="stream-box text-gray-300"></div></div>`);
                    const boxSingle = document.getElementById(idSingle);
                    const renderTarget = createSynthesisBlockDOM(session, runId, true, null);
                    session._judgeInputs = { sysPrompt: sysAlpha, history: [...session.data.simple_history], runId, isSimple: true };
                    session._checkpoint = { phase: 'simple', runId, startTime, sysAlpha, userInput };

                    const finalSingle = await callModelStream(config.models.alpha, sysAlpha, session.data.simple_history, (c, ft) => {
                        appendTextWithSmartScroll(session, boxSingle, c);
                        renderTargetWithSmartScroll(session, ft, renderTarget);
                    }, signal);

                    session.data.simple_history.push({ role: 'assistant', content: finalSingle });
                    session.data.last_synthesis = finalSingle;
                    session.data.rawMarkdownMap[runId] = finalSingle;
                    session.data.full_conversation += `### 意图输入\n${userInput}\n\n### 极简输出\n${finalSingle}\n\n---\n\n`;
                    saveSessionIncremental(session);
                    session.data.blocks.push({ type: 'synthesis', runId, isSimple: true, markdown: finalSingle });

                    // Render synthesis as pinnable blocks
                    renderSynthesisAsBlocks(session, finalSingle, runId, { sessionTitle: session.title, model: config.models.alpha, type: 'simple' });

                    // Inject pin button on log
                    injectPinButtonsForRound(session, 0, 'simple', finalSingle, runId, idSingle);

                    // Simple mode output does NOT get collapsed

                    const tc = ((Date.now() - startTime) / 1000).toFixed(1);
                    appendToLogWithSmartScroll(session, `<p class="text-white font-bold mt-4 bg-blue-900/20 p-3 rounded border border-blue-800 text-sm">输出完成。</p>`);

                    session.status = 'complete';
                    session._metrics = { mode: 'simple', text: `模式: 极简单模 | 耗时: ${tc}s` };
                    setSessionStatus(session, '执行完成', 'done');

                } else {
                    // === CAMPFIRE MODE ===
                    // Build intent with history context for continuations
                    let intent;
                    if (isContinuation && session.data.last_synthesis) {
                        let contextParts = [`[历史基准]\n${session.data.full_conversation}`];

                        if (session.data.lastScanReport) {
                            contextParts.push(`[上轮分歧分析]\n${session.data.lastScanReport}`);
                        }

                        if (session.data.lastMindOutputs) {
                            // Include truncated mind outputs (first 500 chars each) to avoid context overflow
                            const alphaSnippet = session.data.lastMindOutputs.alpha?.substring(0, 500) || '';
                            const betaSnippet = session.data.lastMindOutputs.beta?.substring(0, 500) || '';
                            if (alphaSnippet) contextParts.push(`[上轮Mind1摘要]\n${alphaSnippet}...`);
                            if (betaSnippet) contextParts.push(`[上轮Mind2摘要]\n${betaSnippet}...`);
                        }

                        contextParts.push(`[新意图]\n${userInput}`);
                        intent = contextParts.join('\n\n');
                    } else {
                        intent = userInput;
                    }
                    let historyA = [{ role: 'user', content: intent }], historyB = [{ role: 'user', content: intent }];
                    let finalA = "", finalB = "", scanReport = "";
                    let actualRounds = 0, finalEntropy = 10;

                    for (let r = 1; r <= maxRounds; r++) {
                        actualRounds = r;
                        session._roundProgress = `${r}/${maxRounds}`;
                        setSessionStatus(session, `对比分析 (R${r}/${maxRounds})`);
                        updateTabState(session);
                        appendToLogWithSmartScroll(session, `<p class="text-orange-500 mt-6 font-bold border-b border-gray-800 pb-1">ROUND ${r}/${maxRounds}: 双模对比</p>`);
                        const idA = `a_${session.id}_${runId}_r${r}`, idB = `b_${session.id}_${runId}_r${r}`;
                        appendToLogWithSmartScroll(session, `<div class="grid grid-cols-2 gap-4 mt-2"><div><span class="text-blue-400 text-[10px] uppercase font-bold">Mind \u03b1 (R${r})</span><div id="${idA}" class="stream-box"></div></div><div><span class="text-purple-400 text-[10px] uppercase font-bold">Mind \u03b2 (R${r})</span><div id="${idB}" class="stream-box"></div></div></div>`);

                        session._checkpoint = { phase: 'minds', round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                        const boxA = document.getElementById(idA), boxB = document.getElementById(idB);
                        const [resA, resB] = await Promise.all([
                            callModelStream(config.models.alpha, sysAlpha, historyA, (c) => appendTextWithSmartScroll(session, boxA, c), signal),
                            callModelStream(config.models.beta, sysBeta, historyB, (c) => appendTextWithSmartScroll(session, boxB, c), signal)
                        ]);
                        finalA = resA; finalB = resB;
                        session.data.lastMindOutputs = { alpha: resA, beta: resB };

                        // Pin buttons for mind outputs
                        injectPinButtonsForRound(session, r, 'mind1', finalA, runId, idA);
                        injectPinButtonsForRound(session, r, 'mind2', finalB, runId, idB);

                        // Collapse mind stream boxes
                        collapseStreamBox(document.getElementById(idA), finalA.length);
                        collapseStreamBox(document.getElementById(idB), finalB.length);

                        setSessionStatus(session, `差分审计 (R${r}/${maxRounds})`);
                        appendToLogWithSmartScroll(session, `<p class="text-green-500 mt-4 text-[10px] font-bold uppercase tracking-widest">分析差异...</p>`);
                        const idS = `s_${session.id}_${runId}_r${r}`;
                        appendToLogWithSmartScroll(session, `<div id="${idS}" class="stream-box text-green-700"></div>`);
                        session._checkpoint = { phase: 'scan', round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                        scanReport = await callModelStream(config.models.scan, directives.scan, [{ role: 'user', content: `MIND 1:\n${resA}\n\nMIND 2:\n${resB}` }], (c) => appendTextWithSmartScroll(session, document.getElementById(idS), c), signal);

                        // Pin button for scan
                        injectPinButtonsForRound(session, r, 'scan', scanReport, runId, idS);

                        // Collapse scan stream box
                        collapseStreamBox(document.getElementById(idS), scanReport.length);
                        session.data.lastScanReport = scanReport;
                        saveSessionIncremental(session);

                        const scoreMatch = scanReport.match(/\[分歧度评分:\s*(\d+)\/10\]/);
                        finalEntropy = scoreMatch ? parseInt(scoreMatch[1]) : 10;

                        // Check if scan requests clarification from user
                        const clarifyMatch = scanReport.match(/\[需要澄清:\s*(.+?)\]/);
                        if (clarifyMatch && r === 1) {
                            const clarifyQuestion = clarifyMatch[1];
                            appendToLogWithSmartScroll(session, `<p class="text-yellow-400 font-bold mt-2 p-3 border border-yellow-800 bg-yellow-900/10 rounded">⚠️ 问题边界模糊：${escapeHtml(clarifyQuestion)}</p>`);
                            appendToLogWithSmartScroll(session, `<div class="flex gap-2 mt-2"><input type="text" class="clarify-input flex-grow bg-gray-900 border border-yellow-800 rounded p-2 text-sm text-white outline-none focus:border-yellow-500" placeholder="补充说明..." data-session-id="${session.id}"><button class="clarify-submit bg-yellow-900/50 hover:bg-yellow-900 text-yellow-400 border border-yellow-800 px-4 rounded text-xs font-bold transition" data-session-id="${session.id}">补充并继续</button><button class="clarify-skip text-gray-500 hover:text-gray-300 border border-gray-700 px-3 rounded text-xs transition" data-session-id="${session.id}">跳过</button></div>`);
                            // Pause: store state for resumption after user input
                            session._clarifyState = { round: r, runId, startTime, sysAlpha, sysBeta, sysJudge, historyA: JSON.parse(JSON.stringify(historyA)), historyB: JSON.parse(JSON.stringify(historyB)), finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };
                            session.status = 'waiting_clarify';
                            session._roundProgress = null;
                            setSessionStatus(session, '等待补充...', 'normal');
                            updateTabState(session);
                            return; // exit runIgnition, will resume via clarify handler
                        }

                        if (finalEntropy < 4) {
                            appendToLogWithSmartScroll(session, `<p class="text-green-400 font-bold mt-2">>>> 双方观点基本一致 (一致度 ${(10-finalEntropy)*10}%)，跳过后续轮次。</p>`);
                            break;
                        } else if (r < maxRounds) {
                            appendToLogWithSmartScroll(session, `<p class="text-orange-400 font-bold mt-2">>>> 一致度 ${(10-finalEntropy)*10}%，继续下一轮对比。</p>`);
                            historyA.push({ role: 'assistant', content: resA }, { role: 'user', content: `差分审计揭示了以下分歧：\n${scanReport}\n\n请开放整合这些信息。若你的判断有调整，明确说明改变了什么；若仍坚持，给出新的具体理由。` });
                            historyB.push({ role: 'assistant', content: resB }, { role: 'user', content: `差分审计揭示了以下分歧：\n${scanReport}\n\n请开放整合这些信息。若你的判断有调整，明确说明改变了什么；若仍坚持，给出新的具体理由。` });
                        } else {
                            appendToLogWithSmartScroll(session, `<p class="text-red-400 font-bold mt-2">>>> 达到最大轮次 (一致度 ${(10-finalEntropy)*10}%)，进入综合。</p>`);
                        }
                    }

                    session._roundProgress = null;
                    setSessionStatus(session, '生成结论...', 'pulse');
                    updateTabState(session);
                    appendToLogWithSmartScroll(session, `<p class="text-orange-500 mt-8 font-bold border-b border-gray-800 pb-1 uppercase tracking-widest">综合结论</p>`);

                    session._checkpoint = { phase: 'judge', runId, startTime, sysAlpha, sysBeta, sysJudge, finalA, finalB, scanReport, actualRounds, finalEntropy, userInput, maxRounds };

                    const renderTarget = createSynthesisBlockDOM(session, runId, false, finalEntropy);
                    const judgeUserMsg = `意图: ${userInput}\nMIND 1:\n${finalA}\nMIND 2:\n${finalB}\nDIFF:\n${scanReport}`;
                    session._judgeInputs = { userMsg: judgeUserMsg, sysPrompt: sysJudge, runId, isSimple: false };
                    const synthesis = await callModelStream(config.models.judge, sysJudge, [{ role: 'user', content: judgeUserMsg }], (c, ft) => {
                        renderTargetWithSmartScroll(session, ft, renderTarget);
                    }, signal);

                    // Final synthesis output does NOT get collapsed

                    session.data.last_synthesis = synthesis;
                    session.data.rawMarkdownMap[runId] = synthesis;
                    session.data.full_conversation += `### 问题\n${userInput}\n\n### 综合结论\n${synthesis}\n\n---\n\n`;
                    saveSessionIncremental(session);
                    session.data.blocks.push({ type: 'synthesis', runId, isSimple: false, markdown: synthesis });

                    // Render synthesis as pinnable blocks
                    renderSynthesisAsBlocks(session, synthesis, runId, { sessionTitle: session.title, rounds: actualRounds, model: 'synthesis', type: 'campfire' });

                    const timeCost = ((Date.now() - startTime) / 1000).toFixed(1);
                    appendToLogWithSmartScroll(session, `<p class="text-white font-bold mt-6 bg-green-900/20 p-3 rounded border border-green-800 text-sm">分析完成。</p>`);
                    const convergenceRate = (10 - finalEntropy) * 10;

                    session.status = 'complete';
                    session._metrics = { mode: 'campfire', text: `对比: ${actualRounds} 轮 | 一致度: ${convergenceRate}% | 耗时: ${timeCost}s` };
                    setSessionStatus(session, '合成完毕', 'done');
                }

                session._checkpoint = null;
                await saveSessionToVault(session);
                session._savedToVault = true;
                updateTabState(session);

            } catch (err) {
                if (err.name === 'AbortError') {
                    session.status = 'failed';
                    session.phase = '已取消';
                    session._checkpoint = null;
                    appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">会话已被用户取消。</p>`);
                } else if (session._checkpoint) {
                    session.status = 'interrupted';
                    session.phase = '已中断';
                    setSessionStatus(session, '已中断 — 可续传', 'normal');
                    appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">!! 网络中断: ${escapeHtml(err.message)}</p>`);
                    appendToLogWithSmartScroll(session, `<button class="resume-btn mt-2 bg-orange-900/30 hover:bg-orange-900/50 text-orange-400 border border-orange-800 px-4 py-2 rounded text-xs font-bold transition w-full" data-session-id="${session.id}">🔄 断点续传 — 从 ${session._checkpoint.phase === 'minds' ? 'Mind 对比' : session._checkpoint.phase === 'scan' ? '差异分析' : session._checkpoint.phase === 'judge' ? '综合结论' : '输出'} 继续</button>`);
                } else {
                    session.status = 'failed';
                    session.phase = '系统异常';
                    setSessionStatus(session, '系统异常', 'normal');
                    appendToLogWithSmartScroll(session, `<p class="text-red-500 mt-4 p-2 border border-red-900 bg-red-900/10 text-sm">!! 错误: ${escapeHtml(err.message)}</p>`);
                }
            } finally {
                if (session.status === 'waiting_clarify') {
                    // Don't clean up — session is paused waiting for user input
                    sessionManager.runningSessions.delete(sessionId);
                    session._roundProgress = null;
                    updateTabState(session);
                    if (session.id === sessionManager.activeSessionId) updateHeaderForSession(session);
                    drainQueue();
                } else {
                    stopSessionTimer(session);
                    sessionManager.runningSessions.delete(sessionId);
                    session._roundProgress = null;
                    updateTabState(session);
                    if (session.id === sessionManager.activeSessionId) {
                        updateHeaderForSession(session);
                        updateMetricsForSession(session);
                    }
                    drainQueue();
                    cleanupOldSessions();
                    // Auto-run pending follow-up
                    if (session._pendingFollowUp && (session.status === 'complete')) {
                        const followUp = session._pendingFollowUp;
                        session._pendingFollowUp = null;
                        session.userInput = followUp;
                        startSession(session.id);
                    }
                }
            }
        }

        // ==========================================
        // 9. V6.0 SYNTHESIS BLOCK SPLITTER + PIN BUTTONS
        // ==========================================
        function splitMarkdownIntoBlocks(markdown) {
            if (!markdown || !markdown.trim()) return [markdown || ''];

            // Split at headings (# or ##) and horizontal rules (---)
            const blocks = [];
            const lines = markdown.split('\n');
            let current = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const isHeading = /^#{1,3}\s/.test(line);
                const isHR = /^---+\s*$/.test(line.trim());

                if ((isHeading || isHR) && current.length > 0) {
                    const text = current.join('\n').trim();
                    if (text) blocks.push(text);
                    current = [];
                    if (!isHR) current.push(line);
                } else {
                    current.push(line);
                }
            }
            if (current.length > 0) {
                const text = current.join('\n').trim();
                if (text) blocks.push(text);
            }

            // Fallback: if only 1 block, split on double newlines
            if (blocks.length <= 1 && markdown.length > 200) {
                const parBlocks = markdown.split(/\n\n+/).filter(b => b.trim());
                if (parBlocks.length > 1) return parBlocks;
            }

            return blocks.length > 0 ? blocks : [markdown];
        }

        function renderSynthesisAsBlocks(session, rawMarkdown, runId, sourceMeta) {
            const targetId = `render_${session.id}_${runId}`;
            const targetEl = document.getElementById(targetId);
            if (!targetEl) return;

            const blocks = splitMarkdownIntoBlocks(rawMarkdown);

            let html = '';
            blocks.forEach((block, i) => {
                const blockId = `pblock_${session.id}_${runId}_${i}`;
                _logPinTextStore.set(blockId, block);
                html += `<div class="pinnable-block" id="${blockId}">`;
                html += `<div class="prose prose-sm prose-invert max-w-none prose-orange">${marked.parse(block, { gfm: true, breaks: true })}</div>`;
                html += `</div>`;
            });

            targetEl.innerHTML = html;

            // Show action buttons + completion indicator
            const wrap = document.getElementById(`wrap_${session.id}_${runId}`);
            if (wrap) {
                const actions = wrap.querySelector('.synthesis-actions');
                if (actions) actions.style.display = '';
                // Flash completion badge on title line
                const titleSpan = wrap.querySelector('span:first-child');
                if (titleSpan && !titleSpan.querySelector('.done-badge')) {
                    titleSpan.insertAdjacentHTML('beforeend', ' <span class="done-badge text-green-500 text-[9px] opacity-0 transition-opacity duration-500">✓ 完成</span>');
                    requestAnimationFrame(() => {
                        const badge = titleSpan.querySelector('.done-badge');
                        if (badge) badge.style.opacity = '1';
                    });
                }
            }
        }
